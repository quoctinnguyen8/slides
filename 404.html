<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Không tìm thấy trang</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <style>
        :root {
            --bg: #f3f4f6;
            --panel: #ffffff;
            --text: #111827;
            --muted: #6b7280;
            --border: #e5e7eb;
            --accent: #10a37f;
            --accent-hover: #0f8f70;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            padding: 24px;
        }

        .card {
            width: min(560px, 100%);
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            text-align: center;
        }

        .code {
            margin: 0;
            font-size: 64px;
            line-height: 1;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .title {
            margin: 14px 0 8px;
            font-size: 24px;
        }

        .description {
            margin: 0;
            color: var(--muted);
            font-size: 15px;
            line-height: 1.6;
        }

        .actions {
            margin-top: 22px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            padding: 10px 14px;
            border-radius: 10px;
            font-weight: 600;
            border: 1px solid transparent;
            transition: background-color .2s ease, border-color .2s ease;
        }

        .btn-primary {
            background: var(--accent);
            color: #ffffff;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: #ffffff;
            color: var(--text);
            border-color: var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
    </style>
</head>
<body>
    <main class="card">
        <p class="code">404</p>
        <h1 class="title">Không tìm thấy trang</h1>
        <p class="description">
            Liên kết bạn truy cập không tồn tại hoặc đã được di chuyển.
            Hãy quay về trang chủ để tiếp tục xem danh mục slide.
        </p>

        <div class="actions">
            <a class="btn btn-primary" href="/">
                <i class="fa-solid fa-house"></i>
                Về trang chủ
            </a>
            <a class="btn btn-secondary" href="javascript:history.back()">
                <i class="fa-solid fa-arrow-left"></i>
                Quay lại
            </a>
        </div>
    </main>
</body>
</html>
